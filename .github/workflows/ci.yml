name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build, test, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # `verify` runs the full lifecycle: compile -> unit + Testcontainers IT
      # tests -> shade fat JAR. JaCoCo's prepare-agent/report are bound in the
      # build, so coverage is produced here without an extra invocation.
      # Docker is preinstalled on ubuntu-latest, so Testcontainers PostgreSQL works.
      - name: Build, test and package (with coverage)
        run: mvn -B clean verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Upload surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t webhook-service:${{ github.sha }} .

  slo-check:
    name: SLO performance gate (k6)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Start stack
        run: docker compose up -d

      - name: Wait for app health
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/api/health 2>/dev/null && break
            echo "Waiting for app... $i/30"
            sleep 3
          done
          curl -fsS http://localhost:8080/api/health

      - name: Run SLO check (k6 thresholds)
        run: cd load-tests && k6 run ci-check.js

      - name: Stop stack
        if: always()
        run: docker compose down -v
