name: Release

# Release automation (Conventional Commits + SemVer).
#
# On every push to main, release-please looks at the commits since the last
# release and maintains a "Release PR" that bumps the version and updates the
# CHANGELOG:
#   fix:            -> patch  (1.0.0 -> 1.0.1)
#   feat:           -> minor  (1.0.0 -> 1.1.0)
#   feat!: / BREAKING CHANGE -> major (1.0.0 -> 2.0.0)
# Merging that Release PR creates the git tag vX.Y.Z + a GitHub Release. THAT is
# what gates the publish job below (release_created == true), which attaches the
# fat JAR to the Release and pushes the Docker image to GHCR as :X.Y.Z and :latest.

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish JAR + Docker image
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn -B clean package -DskipTests

      - name: Attach JAR to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" target/webhook-service.jar --clobber

      - name: Compute lowercase image name and version
        id: meta
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (:X.Y.Z and :latest)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ steps.meta.outputs.version }}"
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
